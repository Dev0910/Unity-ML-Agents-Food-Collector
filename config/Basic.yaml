behaviors:
  Move Towards Goal:
    trainer_type: ppo
    hyperparameters:
      batch_size: 10
      buffer_size: 100
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
gail:
strength: 0.5
demo_path: Demos/FoodAgentDemo.demo
behavioral_cloning:
strength: 0.5
demo_path: Demos/FoodAgentDemo.demo
max_steps: 500000
time_horizon: 64
summary_freq: 10000
